<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StrongIL - מעקב אימונים</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="StrongIL">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app">
        <!-- Header -->
        <header>
            <h1 id="page-title">האימונים שלי</h1>
            <button id="add-workout-btn" class="icon-btn"><i data-lucide="plus-circle"></i></button>
        </header>

        <!-- Main Content Screens -->
        <main id="content">
            <!-- Home Screen -->
            <section id="screen-home" class="screen">
                <div class="welcome-card">
                    <h2>היי גיבור! 🔥</h2>
                    <p>מוכן לשבור שיאים היום?</p>
                </div>
                <h3>אימונים אחרונים</h3>
                <div id="history-list"></div>
            </section>

            <!-- Workouts/Editor Screen -->
            <section id="screen-workouts" class="screen hidden">
                <div id="workout-editor">
                    <input type="text" id="workout-name-input" placeholder="שם האימון (למשל: גב ויד קדמית)">
                    <div id="exercises-container"></div>
                    <button class="btn-secondary" onclick="addExerciseField()">+ הוסף תרגיל</button>
                    <button class="btn-primary" onclick="saveCurrentWorkout()">שמור אימון</button>
                </div>
            </section>

            <!-- Statistics Screen -->
            <section id="screen-statistics" class="screen hidden">
                <select id="stats-exercise-select" onchange="updateChart()">
                    <option value="">בחר תרגיל לצפייה בגרף</option>
                </select>
                <div class="chart-container">
                    <canvas id="statsChart"></canvas>
                </div>
            </section>

            <!-- Profile Screen -->
            <section id="screen-profile" class="screen hidden">
                <div class="profile-header">
                    <div class="avatar">💪</div>
                    <h2 id="user-name-display">מתאמן Strong</h2>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><span id="total-workouts">0</span><span>אימונים</span></div>
                    <div class="stat-card"><span id="total-volume">0</span><span>נפח כולל</span></div>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('home', event)">
                <i data-lucide="home"></i>
                <span>בית</span>
            </button>
            <button class="nav-item" onclick="switchTab('workouts', event)">
                <i data-lucide="dumbbell"></i>
                <span>אימון</span>
            </button>
            <button class="nav-item" onclick="switchTab('statistics', event)">
                <i data-lucide="bar-chart-2"></i>
                <span>סטטיסטיקה</span>
            </button>
            <button class="nav-item" onclick="switchTab('profile', event)">
                <i data-lucide="user"></i>
                <span>פרופיל</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
        lucide.createIcons();
    </script>
</body>
</html>
